# Rugix system configuration for Strato Pi A/B SD card switching.
#
# Each boot group corresponds to one physical SD card slot of the Strato Pi
# matrix. The slot devices reference the symlinks published by
# `create-normalized-devices`, which map sd-a/sd-b to whichever mmcblk the
# kernel currently has them on.

[config-partition]
partition = 1

[slots.boot-a]
type = "block"
device = "/dev/strato/sd-a-p1"

[slots.system-a]
type = "block"
device = "/dev/strato/sd-a-p2"

[slots.boot-b]
type = "block"
device = "/dev/strato/sd-b-p1"

[slots.system-b]
type = "block"
device = "/dev/strato/sd-b-p2"

[boot-groups.a]
slots = { boot = "boot-a", system = "system-a" }

[boot-groups.b]
slots = { boot = "boot-b", system = "system-b" }

# The Strato Pi MCU controls which physical SD is routed to the CM via its
# switching matrix; the boot flow controller talks to /sys/class/stratopimax
# to drive it. The controller script does not exist yet — placeholder.
[boot-flow]
type = "custom"
controller = "/usr/lib/rugix-strato/boot-flow"
