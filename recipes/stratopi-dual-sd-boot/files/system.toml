# Rugix system configuration for Strato Pi A/B SD card switching.
#
# Each boot group corresponds to one physical SD card slot of the Strato Pi
# matrix. The slot devices reference the symlinks published by
# `create-normalized-devices`, which map sda/sdb to whichever mmcblk the
# kernel currently has them on.

[config-partition]
partition = 1

[slots.boot-a]
type = "block"
device = "/dev/stratopi/sda1"

[slots.system-a]
type = "block"
device = "/dev/stratopi/sda2"

[slots.boot-b]
type = "block"
device = "/dev/stratopi/sdb1"

[slots.system-b]
type = "block"
device = "/dev/stratopi/sdb2"

[boot-groups.a]
slots = { boot = "boot-a", system = "system-a" }

[boot-groups.b]
slots = { boot = "boot-b", system = "system-b" }

# The Strato Pi MCU controls which physical SD is routed to the CM via its
# switching matrix; the boot flow controller talks to /sys/class/stratopimax
# to drive it.
[boot-flow]
type = "custom"
controller = "/usr/lib/stratopi/boot-flow"
